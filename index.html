<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub - Neon Edition</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><defs><linearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'><stop offset='0%25' stop-color='%23FF007A'/><stop offset='100%25' stop-color='%2300E5FF'/></linearGradient></defs><circle cx='12' cy='12' r='12' fill='url(%23g)'/><path stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none' d='M13 10V3L4 14h7v7l9-11h-7z' transform='translate(4,4) scale(0.66)'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0B0B15',
                        darkCard: '#151522',
                        neonPink: '#FF007A',
                        neonCyan: '#00E5FF',
                        danger: '#FF3366',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer components {
            .btn-primary {
                @apply w-full bg-gradient-to-r from-neonPink to-neonCyan text-white text-sm font-bold py-2.5 rounded-lg hover:opacity-90 transition-opacity shadow-[0_0_15px_rgba(255,0,122,0.3)];
            }
            .btn-danger {
                @apply px-4 py-1.5 text-xs font-bold text-white bg-danger hover:bg-red-600 shadow-[0_0_10px_rgba(255,51,102,0.4)] rounded-lg transition-colors;
            }
            .btn-ghost {
                @apply px-4 py-1.5 text-xs font-bold text-gray-300 hover:text-white bg-white/5 hover:bg-white/10 rounded-lg transition-colors;
            }
            .btn-panel {
                @apply flex flex-1 items-center justify-center gap-1.5 px-4 py-2 bg-[#0B0B15] border border-white/10 text-white text-xs rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed;
            }
            .btn-icon-rounded {
                @apply flex items-center justify-center p-1.5 text-gray-500 hover:text-white bg-white/5 hover:bg-white/10 rounded-full transition-all shrink-0;
            }
            .btn-card-action {
                @apply flex items-center justify-center text-gray-400 bg-white/5 border border-white/10 rounded-lg transition-all shrink-0;
            }
            .form-input {
                @apply w-full bg-[#0B0B15] text-white text-xs border border-white/10 rounded-lg focus:outline-none focus:border-neonCyan focus:ring-1 focus:ring-neonCyan transition-all;
            }
            .form-label {
                @apply block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1;
            }
            .modal-panel {
                @apply bg-darkCard border border-white/10 rounded-2xl p-5 sm:p-6 relative transform scale-95 transition-transform duration-200 m-auto shadow-2xl;
            }
            .badge-neon {
                @apply text-[10px] font-bold px-2.5 py-0.5 bg-white/5 text-neonCyan rounded-full border border-neonCyan/20;
            }
        }
    </style>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            background-color: #0B0B15;
            color: #ffffff;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 122, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        .masonry { column-count: 1; column-gap: 1rem; }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        @media (min-width: 1280px) { .masonry { column-count: 4; } }
        @media (min-width: 1536px) { .masonry { column-count: 5; } }
        
        .masonry-item { break-inside: avoid-column; margin-bottom: 1rem; display: inline-block; width: 100%; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .gradient-border {
            position: relative;
            background: linear-gradient(135deg, #151522, #151522) padding-box,
                        linear-gradient(135deg, rgba(255,0,122,0.5), rgba(0,229,255,0.5)) border-box;
            border: 1px solid transparent;
        }
        .gradient-border:hover {
            background: linear-gradient(135deg, #1c1c2e, #1c1c2e) padding-box,
                        linear-gradient(135deg, #FF007A, #00E5FF) border-box;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
        }

        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #FF007A, #00E5FF);
        }

        .btn-outline-gradient {
            position: relative;
            background: transparent;
            z-index: 1;
        }
        .btn-outline-gradient::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            padding: 2px;
            background: linear-gradient(to right, #FF007A, #00E5FF);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .btn-outline-gradient:hover {
            background: linear-gradient(to right, rgba(255,0,122,0.1), rgba(0,229,255,0.1));
            box-shadow: 0 0 12px rgba(255, 0, 122, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen">

    <header class="fixed top-0 inset-x-0 h-14 backdrop-blur-xl bg-darkBg/80 border-b border-white/5 z-40 flex items-center justify-between px-4 md:px-6 shadow-sm gap-3">
        <div class="flex items-center space-x-2 shrink-0">
            <div class="w-7 h-7 rounded-full bg-gradient-to-tr from-neonPink to-neonCyan flex items-center justify-center shadow-[0_0_8px_rgba(255,0,122,0.5)]">
                <svg class="w-3.5 h-3.5 text-white shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            </div>
            <h1 class="text-lg font-bold tracking-tight text-white hidden md:block">Prompt<span class="text-gradient">Hub</span></h1>
        </div>

        <div class="flex-1 max-w-lg relative group">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 transition-colors group-focus-within:text-neonCyan z-10 pointer-events-none shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="searchInput" placeholder="搜索... (⌘K)" class="form-input relative z-0 !bg-[#151522]/80 backdrop-blur-sm pl-9 pr-14 py-2 placeholder-gray-400">
            
            <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-1 z-10">
                <span id="searchShortcutHint" class="text-[9px] px-1.5 py-0.5 bg-white/5 border border-white/10 rounded text-gray-500 pointer-events-none">⌘K</span>
                <button id="clearSearchBtn" onclick="clearSearch()" class="p-1 text-gray-500 hover:text-white hidden transition-colors shrink-0" title="清空搜索">
                    <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

        <div class="flex items-center gap-2 shrink-0">
            <button onclick="openSettingsModal()" class="btn-icon-rounded shrink-0" title="设置与管理">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
            <button onclick="openAddModal()" class="btn-outline-gradient text-white px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap">
                + 新建
            </button>
        </div>
    </header>

    <div class="max-w-[1500px] mx-auto pt-20 px-4 md:px-6 space-y-4">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b border-white/5 pb-3">
            <div id="categoryTabs" class="flex gap-1.5 overflow-x-auto no-scrollbar w-full sm:w-auto pb-1"></div>
            <div class="text-xs text-gray-500 whitespace-nowrap shrink-0">
                共 <span id="statTotal" class="text-neonCyan font-bold mx-0.5">0</span> 条
            </div>
        </div>
        <div id="promptList" class="masonry pb-10"></div>
    </div>

    <!-- ================= 核心表单 Modal ================= -->
    <div id="addModal" onclick="if(event.target === this) attemptCloseAddModal()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 overflow-y-auto px-4 py-6">
        <div class="modal-panel max-w-3xl w-full" id="addModalContent">
            <button onclick="attemptCloseAddModal()" class="btn-icon-rounded absolute top-4 right-4 z-10 shrink-0"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            
            <div class="flex items-center gap-3 mb-5" id="formModalHeader"></div>
            
            <div class="flex flex-col md:flex-row gap-5 mb-5 md:items-start">
                <div class="w-full md:w-5/12 flex flex-col gap-4">
                    <div>
                        <label class="form-label">分类</label>
                        <select id="categorySelect" class="form-input px-3 py-2.5 cursor-pointer"></select>
                    </div>
                    <div>
                        <label class="form-label flex justify-between">
                            <span>标题</span>
                            <span class="text-[9px] text-neonCyan font-normal normal-case"><span class="font-mono">{{变量}}</span> 支持动态填空</span>
                        </label>
                        <input type="text" id="titleInput" placeholder="一句话描述用途" class="form-input px-3 py-2.5" onfocus="this.select()">
                    </div>
                    
                    <div class="w-full flex flex-col">
                        <label class="form-label flex justify-between">
                            <span>视觉参考图</span>
                            <span class="text-gray-500 font-normal normal-case tracking-normal">支持直接 Ctrl+V 粘贴</span>
                        </label>
                        
                        <div id="uploadZone" onclick="document.getElementById('imageInput').click()" 
                            class="w-full h-[160px] border border-dashed border-white/15 rounded-lg p-4 text-center cursor-pointer bg-[#0B0B15]/50 hover:bg-[#0B0B15] hover:border-neonPink transition-all group flex flex-col items-center justify-center">
                            <svg class="w-5 h-5 text-gray-600 group-hover:text-neonPink transition-colors mb-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            <span id="uploadTip" class="text-[11px] text-gray-500 font-medium group-hover:text-white transition-colors">点击或粘贴截图</span>
                        </div>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">

                        <div id="previewWrapper" class="hidden relative group w-full h-[160px]">
                            <img id="previewImg" src="" class="w-full h-full object-cover rounded-lg border border-white/10">
                            <div class="absolute inset-0 bg-black/50 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity rounded-lg flex items-center justify-center backdrop-blur-sm">
                                <button onclick="clearSelectedImage()" class="btn-icon-rounded text-white bg-danger hover:bg-red-600 shadow-lg transform scale-90 md:group-hover:scale-100 shrink-0">
                                    <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-full md:w-7/12 flex flex-col h-full">
                    <label class="form-label">内容 <span class="text-neonPink">*</span></label>
                    <textarea id="contentInput" placeholder="描述你希望 AI 做什么... 可以包含 {{你的变量}} 实现点击复制时动态填空。" class="form-input px-3 py-2.5 w-full resize-none leading-relaxed min-h-[200px] max-h-[50vh] overflow-y-auto" oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'"></textarea>
                </div>
            </div>

            <div class="flex gap-3 mt-2 pt-4 border-t border-white/5">
                <button onclick="attemptCloseAddModal()" class="btn-ghost flex-1 border border-white/10 hover:bg-white/10">取消编辑</button>
                <button id="formSubmitBtn" onclick="savePrompt()" class="btn-primary flex-[2]"></button>
            </div>
        </div>
    </div>

    <!-- ================= 动态变量引擎 Modal ================= -->
    <div id="variableModal" onclick="if(event.target === this) closeVariableModal()" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 px-4">
        <div class="modal-panel max-w-sm w-full" id="variableModalContent">
            <button onclick="closeVariableModal()" class="btn-icon-rounded absolute top-4 right-4 shrink-0"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            <div class="flex items-center gap-3 mb-5">
                <div class="p-2 bg-neonCyan/10 rounded-lg border border-neonCyan/20">
                    <svg class="w-5 h-5 text-neonCyan shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                </div>
                <div>
                    <h3 class="text-base font-bold text-white tracking-tight">Dynamic <span class="text-neonCyan">Variables</span></h3>
                    <p class="text-[10px] text-gray-500">检测到模板变量，请填入具体内容。</p>
                </div>
            </div>
            
            <div id="variableInputsContainer" class="space-y-4 mb-6 max-h-[60vh] overflow-y-auto no-scrollbar pr-1"></div>
            
            <button onclick="executeVariableCopy()" class="btn-primary flex items-center justify-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                填充并复制 (Enter)
            </button>
        </div>
    </div>

    <!-- ================= 全局设置 Modal ================= -->
    <div id="settingsModal" onclick="if(event.target === this) closeSettingsModal()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 px-4 overflow-y-auto">
        <div class="modal-panel max-w-md w-full" id="settingsModalContent">
            <button onclick="closeSettingsModal()" class="btn-icon-rounded absolute top-4 right-4 shrink-0"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            <div class="flex items-center gap-3 mb-5">
                <div class="p-2 bg-neonPink/10 rounded-lg border border-neonPink/20"><svg class="w-5 h-5 text-neonPink shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></div>
                <h3 class="text-lg font-bold text-white tracking-tight">Global <span class="text-neonPink">Settings</span></h3>
            </div>

            <div class="flex border-b border-white/10 mb-5">
                <button onclick="switchSettingsTab('sync')" id="tab-btn-sync" class="flex-1 py-2.5 text-xs font-bold text-neonCyan border-b-2 border-neonCyan transition-colors">云端与备份</button>
                <button onclick="switchSettingsTab('category')" id="tab-btn-category" class="flex-1 py-2.5 text-xs font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-300 transition-colors">分类管理</button>
                <button onclick="switchSettingsTab('advanced')" id="tab-btn-advanced" class="flex-1 py-2.5 text-xs font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-300 transition-colors">高级</button>
            </div>
            
            <div class="relative min-h-[300px] max-h-[55vh] overflow-y-auto overflow-x-hidden pr-2 no-scrollbar">
                
                <!-- 1. 云端与备份 Tab -->
                <div id="tab-content-sync" class="space-y-6 block">
                    <div class="p-3 bg-[#0B0B15]/50 border border-neonCyan/20 rounded-xl">
                        <h4 class="form-label flex items-center justify-between !text-neonCyan mb-3">
                            <span class="flex items-center gap-1.5">
                                <svg class="w-3.5 h-3.5 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"></path></svg>
                                GitHub 云同步 (BYOK)
                            </span>
                            <span class="text-[9px] px-1.5 py-0.5 border border-green-500/30 text-green-400 bg-green-500/10 rounded flex items-center gap-1 shrink-0" title="End-to-End Encryption Available">
                                <svg class="w-2.5 h-2.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> E2EE
                            </span>
                        </h4>
                        <div class="space-y-2.5">
                            <input type="password" id="githubTokenInput" placeholder="请输入 GitHub PAT (Personal Access Token)" class="form-input px-3 py-2 text-xs" oninput="localStorage.setItem('PromptHub_GithubToken', this.value.trim())">

    <!-- ================= 确认删除 Modal ================= -->
    <div id="confirmModal" onclick="if(event.target === this) closeConfirmModal()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 px-4">

            <div class="flex items-center gap-2 mb-3">

                    <svg class="w-4 h-4 text-danger shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>

    <!-- ================= 全屏图片预览灯箱 ================= -->
    <div id="imageLightboxModal" onclick="if(event.target === this) closeImageLightbox()" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[70] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-4 sm:p-10 cursor-zoom-out">
        <button onclick="closeImageLightbox()" class="btn-icon-rounded absolute top-4 right-4 z-10 bg-black/50 hover:bg-black text-white shrink-0"><svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 bg-darkCard border border-white/10 text-white px-4 py-2 rounded-full shadow-[0_4px_15px_rgba(0,0,0,0.5)] text-xs font-medium opacity-0 pointer-events-none transition-all z-[80] flex items-center gap-1.5 transform -translate-y-2">
        <span id="toastIcon"></span>
        <span id="toastMessage"></span>
    </div>

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        const escapeHtml = (s) => {
            if (s === null || s === undefined) return '';
            return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        };

        // ==========================================
        // 0. 分类管理系统
        // ==========================================
        const DEFAULT_CATEGORIES = ['通用', 'UI/UX 视觉', '代码开发', '文案编辑'];
        
        function getCategories() {
            const saved = localStorage.getItem('PromptHub_Categories');
            let cats = saved ? JSON.parse(saved) : DEFAULT_CATEGORIES;
            if (!cats.includes('通用')) {
                cats.unshift('通用');
                saveCategories(cats);
            }
            return cats;
        }

        function saveCategories(cats) {
            localStorage.setItem('PromptHub_Categories', JSON.stringify(cats));
        }

        // ==========================================
        // 1. IndexedDB 存储核心
        // ==========================================
        const DB_NAME = 'PromptHub_DB';
        const DB_VERSION = 1;
        const STORE_NAME = 'prompts';
        let db = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' }); 
                    }
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(db); };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        const dbOps = {
            add: (data) => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                tx.objectStore(STORE_NAME).add(data).onsuccess = resolve;
                tx.onerror = (e) => reject(e.target.error);
            }),
            put: (data) => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                tx.objectStore(STORE_NAME).put(data).onsuccess = resolve;
                tx.onerror = (e) => reject(e.target.error);
            }),
            getAll: () => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readonly');
                tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => resolve(e.target.result);
                tx.onerror = (e) => reject(e.target.error);
            }),
            delete: (id) => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                tx.objectStore(STORE_NAME).delete(id).onsuccess = resolve;
                tx.onerror = (e) => reject(e.target.error);
            }),
            clearAll: () => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                tx.objectStore(STORE_NAME).clear().onsuccess = resolve;
                tx.onerror = (e) => reject(e.target.error);
            })
        };

        // ==========================================
        // 2. 交互逻辑 (Toast, Modals, 快捷键)
        // ==========================================
        let toastTimeout;
        // Fix: 扩展 showToast 支持 warning 状态
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            
            let iconHtml = '';
            if (type === 'success') {
                iconHtml = '<svg class="w-3.5 h-3.5 text-neonCyan shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>';
            } else if (type === 'warning') {
                iconHtml = '<svg class="w-3.5 h-3.5 text-yellow-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';
            } else {
                iconHtml = '<svg class="w-3.5 h-3.5 text-neonPink shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            }
            document.getElementById('toastIcon').innerHTML = iconHtml;
            
            toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-2');
            toast.classList.add('translate-y-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-2');
                toast.classList.remove('translate-y-0');
            }, 3500); // warning 提示适当延长停留时间
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!document.getElementById('imageLightboxModal').classList.contains('opacity-0')) closeImageLightbox();
                else if (!document.getElementById('variableModal').classList.contains('opacity-0')) closeVariableModal();
                else if (!document.getElementById('confirmModal').classList.contains('opacity-0')) closeConfirmModal();
                else if (!document.getElementById('addModal').classList.contains('opacity-0')) attemptCloseAddModal();
                else if (!document.getElementById('settingsModal').classList.contains('opacity-0')) closeSettingsModal();
            }
            
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
                e.preventDefault(); 
                const hint = document.getElementById('searchShortcutHint');
                hint.classList.add('text-neonCyan', 'border-neonCyan');
                setTimeout(() => hint.classList.remove('text-neonCyan', 'border-neonCyan'), 300);

                const searchInput = document.getElementById('searchInput');
                searchInput.focus();
                if(searchInput.value) searchInput.select();
            }

            if (e.key === 'Enter' && !document.getElementById('variableModal').classList.contains('opacity-0')) {
                executeVariableCopy();
            }
        });

        function openImageLightbox(src) {
            const modal = document.getElementById('imageLightboxModal');
            const img = document.getElementById('lightboxImg');
            img.src = src;
            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => img.classList.remove('scale-95'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeImageLightbox() {
            const modal = document.getElementById('imageLightboxModal');
            const img = document.getElementById('lightboxImg');
            img.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                document.body.style.overflow = '';
            }, 200);
        }

        async function insertMockData() {
            const mockImgBase64 = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MDAiIGhlaWdodD0iNDUwIj48ZGVmcz48bGluZWFyR3JhZGllbnQgaWQ9ImciIHgxPSIwJSIgeTE9IjAlIiB4Mj0iMTAwJSIgeTI9IjEwMCUiPjxzdG9wIG9mZnNldD0iMCUiIHN0b3AtY29sb3I9IiNGRjAwN0EiLz48c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiMwMEU1RkYiLz48L2xpbmVhckdyYWRpZW50PjwvZGVmcz48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSJ1cmwoI2cpIi8+PGNpcmNsZSBjeD0iNDAwIiBjeT0iMjI1IiByPSI4MCIgZmlsbD0id2hpdGUiIG9wYWNpdHk9IjAuMSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0ic2Fucy1zZXJpZiIgZm9udC1zaXplPSIzNiIgZm9udC13ZWlnaHQ9ImJvbGQiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+VmlzdWFsIFJlZmVyZW5jZTwvdGV4dD48L3N2Zz4=";
            const mocks = [
                { id: generateUUID(), category: '通用', title: '智能翻译与解析模板', content: '你是一位精通多国语言的专家。请将以下文本翻译成 {{目标语言}}，并且用最通俗易懂的方式向我解释文本中包含的 {{重点解释领域}} 概念：\n\n文本内容：\n{{需要翻译的文本}}', image: null, timestamp: Date.now() + 1000, isFavorite: true },
                { id: generateUUID(), category: '通用', title: 'Midjourney 极简 Logo', content: 'Logo design, a futuristic letter "P" combined with an infinity symbol, minimalistic, neon cyan and hot pink gradient, dark background, vector art, high resolution, flat design --ar 1:1 --v 6.0', image: mockImgBase64, timestamp: Date.now() },
                { id: generateUUID(), category: '代码开发', title: 'React 瀑布流组件', content: '作为一名前端专家，请帮我用 React 和 TailwindCSS 实现一个纯 CSS 的瀑布流（Masonry）组件。\n\n要求：\n1. 不使用第三方库\n2. 使用 CSS column-count 实现自适应\n3. 卡片内包含图片和不确定长度的文字\n4. 重点解决卡片被截断（break-inside）的兼容性问题。', image: null, timestamp: Date.now() - 1000 },
                { id: generateUUID(), category: '文案编辑', title: 'NFT 项目发售推文', content: '帮我为即将发售的 "Neon Ape" NFT 系列写一条 Twitter 宣传文案。\n要求：语气要极具号召力和未来感，强调 "Free Mint"（免费铸造），包含 Call to action，加上相关标签（#NFT #Web3）。', image: null, timestamp: Date.now() - 2000 },
                { id: generateUUID(), category: 'UI/UX 视觉', title: '赛博朋克控制台', content: '请生成一个赛博朋克风格的后台管理系统界面，主色调为深色，带有霓虹粉和青色的点缀。需要包含侧边栏导航、顶部发光卡片面板和一个带有炫酷数据可视化的折线图。整体需要有玻璃拟态（Glassmorphism）质感。', image: null, timestamp: Date.now() - 3000 }
            ];
            
            const localCats = new Set(getCategories());
            for (const m of mocks) {
                if (m.category) localCats.add(m.category);
                await dbOps.put(m); 
            }
            saveCategories(Array.from(localCats));
            
            showToast('✅ 演示数据已注入成功！');
            closeSettingsModal();
            loadAndRenderList();
        }

        // --- 核心表单弹窗 (支持 新建 / 编辑) ---
        let currentEditId = null;
        let initialFormState = ''; 

        function getFormStateSnapshot() {
            return JSON.stringify({
                c: document.getElementById('categorySelect').value,
                t: document.getElementById('titleInput').value.trim(),
                p: document.getElementById('contentInput').value.trim(),
                i: currentImageBase64
            });
        }

        function openAddModal() {
            currentEditId = null; 
            document.getElementById('formModalHeader').innerHTML = `
                <div class="p-2 bg-neonCyan/10 rounded-lg border border-neonCyan/20">
                    <svg class="w-5 h-5 text-neonCyan shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <h3 class="text-lg font-bold text-white tracking-tight">Create <span class="text-neonCyan">Prompt</span></h3>
            `;
            const submitBtn = document.getElementById('formSubmitBtn');
            submitBtn.innerText = "保存至本地库";
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');

            const select = document.getElementById('categorySelect');
            const cats = getCategories();
            select.innerHTML = cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
            
            if(activeCategory !== 'All' && activeCategory !== '⭐ 收藏') {
                select.value = activeCategory;
            }
            
            document.getElementById('titleInput').value = '';
            
            const contentEl = document.getElementById('contentInput');
            contentEl.value = '';
            contentEl.style.height = 'auto'; 
            
            clearSelectedImage();
            
            initialFormState = getFormStateSnapshot();
            showFormModal();
        }

        async function openEditModal(id) {
            currentEditId = id; 
            document.getElementById('formModalHeader').innerHTML = `
                <div class="p-2 bg-neonPink/10 rounded-lg border border-neonPink/20">
                    <svg class="w-5 h-5 text-neonPink shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </div>
                <h3 class="text-lg font-bold text-white tracking-tight">Edit <span class="text-neonPink">Prompt</span></h3>
            `;
            const submitBtn = document.getElementById('formSubmitBtn');
            submitBtn.innerText = "保存修改";
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');

            const select = document.getElementById('categorySelect');
            const cats = getCategories();
            select.innerHTML = cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

            const records = await dbOps.getAll();
            const item = records.find(r => r.id === id);
            if (!item) return showToast('数据读取失败', 'error');

            document.getElementById('categorySelect').value = item.category || '通用';
            document.getElementById('titleInput').value = item.title || item.tag || '';
            
            const contentEl = document.getElementById('contentInput');
            contentEl.value = item.content || '';
            
            setTimeout(() => {
                contentEl.style.height = 'auto';
                contentEl.style.height = contentEl.scrollHeight + 'px';
            }, 10);

            if (item.image) {

        async function copyPromptText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(text);
                    showToast('✨ 已复制！');
                    return;
                } catch (err) { console.warn('Clipboard API fallback'); }
            }
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.left = "-9999px";
            document.body.appendChild(textArea); textArea.select();
            try {
                if(document.execCommand('copy')) showToast('✨ 已复制！');
                else showToast('复制失败', 'error');
            } catch (err) { showToast('复制异常', 'error'); }
            document.body.removeChild(textArea);
        }

        function getVariableRegex() {
            const regexMode = localStorage.getItem('PromptHub_VarRegex') || 'safe';
            if (regexMode === 'aggressive') {
                return /\{\{([^}]+)\}\}|\[\[([^\]]+)\]\]|【([^】]+)】|\[([^\]]+)\]|<([^>]+)>/g;
            }
            return /\{\{([^}]+)\}\}|\[\[([^\]]+)\]\]|【([^】]+)】/g;
        }

        async function copyPromptTextById(id) {
            try {
                const records = await dbOps.getAll();
                const item = records.find(r => r.id === id);
                if (!item || !item.content) return showToast('找不到内容', 'error');

                const content = item.content;
                const regex = getVariableRegex();

                const matches = [...content.matchAll(regex)];
                
                if (matches.length > 0) {
                    const uniqueVarsMap = new Map();
                    matches.forEach(m => {
                        const outerText = m[0]; 
                        const innerText = m.slice(1).find(v => v !== undefined).trim(); 
                        if(!uniqueVarsMap.has(outerText)) uniqueVarsMap.set(outerText, innerText);
                    });
                    
                    openVariableModal(content, Array.from(uniqueVarsMap.entries()));
                } else {
                    copyPromptText(content);
                }
            } catch (err) { 
                console.error(err);
                showToast('读取异常', 'error'); 
            }
        }

        // ==========================================
        // 3. 核心密码学与云端同步引擎 (AES-GCM + GitHub Gist)
        // ==========================================

        const cryptoOps = {
            async deriveKey(password, salt) {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]);
                return crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
                );
            },
            bufferToBase64(buf) {
                let binStr = ''; const bytes = new Uint8Array(buf); const len = bytes.byteLength;
                for (let i = 0; i < len; i++) binStr += String.fromCharCode(bytes[i]);
                return btoa(binStr);
            },
            base64ToBuffer(base64) {
                const binStr = atob(base64); const len = binStr.length; const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = binStr.charCodeAt(i);
                return bytes;
            },
            async encrypt(text, password) {
                const enc = new TextEncoder();
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await this.deriveKey(password, salt);
                const cipherBuffer = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(text));

                const packed = new Uint8Array(16 + 12 + cipherBuffer.byteLength);
                packed.set(salt, 0); packed.set(iv, 16); packed.set(new Uint8Array(cipherBuffer), 28);
                return this.bufferToBase64(packed);
            },
            async decrypt(base64, password) {
                const packed = this.base64ToBuffer(base64);
                const salt = packed.slice(0, 16);
                const iv = packed.slice(16, 28);
                const cipherBytes = packed.slice(28);

                const key = await this.deriveKey(password, salt);
                try {
                    const decBuffer = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, cipherBytes);
                    return new TextDecoder().decode(decBuffer);
                } catch (e) {
                    throw new Error('解密失败：密码错误或数据已损坏');
                }
            }
        };
        
        async function pushToCloud() {
            const token = localStorage.getItem('PromptHub_GithubToken');
            let gistId = localStorage.getItem('PromptHub_GistId');
            const syncPwd = document.getElementById('syncPasswordInput').value.trim();
            
            if (!token) return showToast('请先填写您的 GitHub Token', 'error');

            const btn = document.getElementById('btn-push-sync');
            const origText = btn.innerHTML;
            btn.innerHTML = '↑ 同步中...';
            btn.disabled = true;

            try {
                let prompts = await dbOps.getAll();
                const categories = getCategories();
                
                let rawPayload = JSON.stringify({ prompts, categories });
                
                // Fix: 探测体积并优雅降级剥离图片。700KB 作为硬边界，确保加上加密膨胀后绝不超过 1MB
                const byteSize = new Blob([rawPayload]).size;
                const MAX_GIST_SIZE = 700 * 1024; 
                
                let didFallback = false;
                if (byteSize > MAX_GIST_SIZE) {
                    didFallback = true;
                    showToast('⚠️ 数据超限，自动降级为纯文本模式以保障同步...', 'warning');
                    // 断臂求生，剥离图片
                    prompts = prompts.map(p => ({ ...p, image: null }));
                    rawPayload = JSON.stringify({ prompts, categories });
                } else {
                    showToast(syncPwd ? '🔐 正在加密并推送至云端...' : '🚀 正在推送至云端...');
                }

                let finalPayload;

                if (syncPwd) {
                    const encryptedStr = await cryptoOps.encrypt(rawPayload, syncPwd);
                    finalPayload = JSON.stringify({ encrypted: true, data: encryptedStr }, null, 2);
                } else {
                    finalPayload = JSON.stringify({ encrypted: false, data: JSON.parse(rawPayload) }, null, 2);
                }
                
                const body = {
                    description: "PromptHub Cloud Sync Backup (BYOK)",
                    public: false, 
                    files: { "prompthub_sync_data.json": { content: finalPayload } }
                };

                let url = 'https://api.github.com/gists';
                let method = 'POST'; 
                if (gistId) { url += `/${gistId}`; method = 'PATCH'; }

                const res = await fetch(url, {
                    method,
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify(body)
                });

                if (!res.ok) throw new Error('API Request Failed');
                const data = await res.json();
                
                if (!gistId) {
                    localStorage.setItem('PromptHub_GistId', data.id);
                    document.getElementById('gistIdInput').value = data.id;
                }
                if (!didFallback) showToast(syncPwd ? '✨ 端到端加密同步成功！' : '✨ 云端同步成功！');
            } catch (err) { 
                console.error(err);
                showToast('❌ 推送失败，请检查 Token', 'error'); 
            } finally {
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        }

        async function pullFromCloud() {
            const token = localStorage.getItem('PromptHub_GithubToken');
            const gistId = localStorage.getItem('PromptHub_GistId');
            const syncPwd = document.getElementById('syncPasswordInput').value.trim();
            
            if (!token || !gistId) return showToast('请确保 Token 和 Gist ID 均已填写', 'error');

            const btn = document.getElementById('btn-pull-sync');
            const origText = btn.innerHTML;
            btn.innerHTML = '↓ 拉取中...';
            btn.disabled = true;

            try {
                showToast('📥 正在从云端拉取数据...');
                const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (!res.ok) throw new Error('API Request Failed');
                const data = await res.json();
                const file = data.files['prompthub_sync_data.json'];
                if (!file) throw new Error('云端找不到有效的数据文件');

                const wrapperData = JSON.parse(file.content);
                let parsedData;

                if (wrapperData.encrypted) {
                    if (!syncPwd) throw new Error('云端数据已加密，请先在设置中输入密码');
                    showToast('🔓 正在进行本地解密...');
                    const decryptedStr = await cryptoOps.decrypt(wrapperData.data, syncPwd);
                    parsedData = JSON.parse(decryptedStr); 
                } else {
                    parsedData = wrapperData.data || wrapperData;
                }

                let importedPrompts = 0;
                let localCats = new Set(getCategories());

                // Fix: 在合并前，提取出本地的已有记录，构建冲突防御地图 (Local Asset Shield)
                const existingRecords = await dbOps.getAll();
                const existingMap = new Map(existingRecords.map(r => [r.id, r]));

                if (parsedData.prompts && Array.isArray(parsedData.prompts)) {
                    for (const item of parsedData.prompts) {
                        if(!item.id) item.id = generateUUID();
                        if (item.category) localCats.add(item.category);
                        
                        // 核心保护：如果云端被降级失去了图片，但本地拥有图片，则反向继承本地资产，拒绝恶意覆盖
                        const localItem = existingMap.get(item.id);
                        if (localItem && localItem.image && !item.image) {
                            item.image = localItem.image;
                        }

                        await dbOps.put(item);
                        importedPrompts++;
                    }
                }
                
                if (parsedData.categories && Array.isArray(parsedData.categories)) {
                    parsedData.categories.forEach(c => localCats.add(c));
                }
                
                saveCategories(Array.from(localCats));

                showToast(`✨ 合并完成！安全更新 ${importedPrompts} 条记录`);
                renderSettingsCategories();
                loadAndRenderList();
            } catch(e) { 
                console.error(e);
                const msg = e.message.includes('密码') ? e.message : '拉取失败，请检查 Gist ID 或网络';
                showToast(`❌ ${msg}`, 'error'); 
            } finally {
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        }

        let currentImageBase64 = null;

        function processImageFile(file) {
            document.getElementById('uploadTip').innerText = "处理压缩中...";
            const img = new Image();
            
            const objectUrl = URL.createObjectURL(file);
            
            img.onload = () => {
                URL.revokeObjectURL(objectUrl); 
                const maxWidth = 1024; let { width, height } = img;
                if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                currentImageBase64 = canvas.toDataURL('image/webp', 0.8);
                
                document.getElementById('previewImg').src = currentImageBase64;
                document.getElementById('uploadZone').classList.add('hidden');
                document.getElementById('previewWrapper').classList.remove('hidden');
                document.getElementById('uploadTip').innerText = "点击或粘贴截图";
            };
            img.src = objectUrl;
        }

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) processImageFile(file);
        });

        document.addEventListener('paste', (e) => {
            const addModal = document.getElementById('addModal');
            const isModalClosed = addModal.classList.contains('opacity-0');

            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    
                    if (isModalClosed) {
                        openAddModal();
                    }
                    
                    processImageFile(file);
                    showToast('识别到剪贴板图片，已开启新建');
                    e.preventDefault();
                    break; 
                }
            }
        });

        function clearSelectedImage() {
            document.getElementById('imageInput').value = '';
            currentImageBase64 = null;
            document.getElementById('previewWrapper').classList.add('hidden');
            document.getElementById('uploadZone').classList.remove('hidden');
        }

        async function savePrompt() {
            const category = document.getElementById('categorySelect').value;
            const title = document.getElementById('titleInput').value.trim();
            const content = document.getElementById('contentInput').value.trim();

            if (!content) return showToast('Prompt 内容为必填', 'error');

            const btn = document.getElementById('formSubmitBtn');
            if (btn.disabled) return;
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            const origText = btn.innerText;
            btn.innerText = '保存中...';

            try {
                let payload = { category, title, content, image: currentImageBase64, timestamp: Date.now() };

                if (currentEditId) {
                    try {
                        const records = await dbOps.getAll();
                        const existingItem = records.find(r => r.id === currentEditId);
                        if (existingItem) {
                            payload = { ...existingItem, ...payload, timestamp: existingItem.timestamp, updatedAt: Date.now() };
                        }
                    } catch(e) { console.warn('合并原数据失败', e); }
                    
                    payload.id = currentEditId; 
                    await dbOps.put(payload);
                    showToast('修改已保存');
                } else {
                    payload.id = generateUUID(); 
                    await dbOps.add(payload);
                    showToast('已保存至本地库');
                }
                
                closeAddModal();
                loadAndRenderList();
            } catch (err) {
                console.error("Save error:", err);
                showToast('保存异常，请重试', 'error');
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.innerText = origText;
            }
        }

        let searchDebounceTimer;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const hasValue = !!e.target.value.trim();
            document.getElementById('clearSearchBtn').classList.toggle('hidden', !hasValue);
            
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                loadAndRenderList();
            }, 300); 
        });

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            document.getElementById('clearSearchBtn').classList.add('hidden');
            loadAndRenderList();
            input.focus();
        }

        async function exportData() {
            try {
                const records = await dbOps.getAll();
                if (records.length === 0) return showToast('暂无数据', 'error');
                
                const dataStr = JSON.stringify(records);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a'); a.href = url;
                a.download = `PromptHub_Backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                showToast('备份已导出');
            } catch (err) { showToast('导出中止', 'error'); }
        }

        document.getElementById('importInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    if (!Array.isArray(data)) throw new Error("Format error");
                    
                    let importedCount = 0;
                    let localCats = new Set(getCategories());
                    
                    for (const item of data) {
                        if (!item.id) item.id = generateUUID();
                        if (item.content) {
                            if (!item.timestamp) item.timestamp = Date.now();
                            if (item.category) localCats.add(item.category);
                            await dbOps.put(item); 
                            importedCount++;
                        }
                    }
                    saveCategories(Array.from(localCats));
                    
                    if(importedCount > 0) showToast(`导入成功 (同步 ${importedCount} 条记录)`);
                    else showToast('文件中未发现有效数据', 'error');
                    
                    document.getElementById('importInput').value = ''; 
                    loadAndRenderList();
                    closeSettingsModal(); 
                } catch (err) {
                    showToast('文件解析失败', 'error');
                }
            };
            reader.readAsText(file);
        });

        // ==========================================
        // 4. 瀑布流渲染与搜索过滤
        // ==========================================
        let activeCategory = 'All';

        function renderCategoryTabs() {
            const tabsContainer = document.getElementById('categoryTabs');
            const userCats = getCategories();
            
            const uniqueTags = ['All', '⭐ 收藏', ...userCats];
            
            tabsContainer.innerHTML = uniqueTags.map(tag => {
                const isActive = tag === activeCategory;
                const label = tag === 'All' ? '全部' : escapeHtml(tag);
                
                let activeClass = isActive 
                    ? 'bg-neonCyan/10 text-neonCyan border-neonCyan/50 shadow-[0_0_8px_rgba(0,229,255,0.2)]' 
                    : 'bg-transparent text-gray-400 border-white/10 hover:border-white/30 hover:text-white';
                
                if (tag === '⭐ 收藏' && isActive) {
                    activeClass = 'bg-yellow-400/10 text-yellow-400 border-yellow-400/50 shadow-[0_0_8px_rgba(250,204,21,0.2)]';
                }
                
                const safeTag = escapeHtml(tag.replace(/\\/g, '\\\\').replace(/'/g, "\\'")); 
                return `<button onclick="setActiveCategory('${safeTag}')" class="px-3 py-1 rounded-full text-[11px] font-medium border transition-all whitespace-nowrap ${activeClass}">${label}</button>`;
            }).join('');
        }

        function setActiveCategory(category) {
            activeCategory = category;
            loadAndRenderList();
        }

        async function loadAndRenderList() {
            const listContainer = document.getElementById('promptList');
            const statTotal = document.getElementById('statTotal');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            
            try {
                let records = await dbOps.getAll();
                records.sort((a, b) => b.timestamp - a.timestamp);
                
                renderCategoryTabs();

                if (activeCategory === '⭐ 收藏') {
                    records = records.filter(item => item.isFavorite);
                } else if (activeCategory !== 'All') {
                    records = records.filter(item => {
                        const itemCat = item.category || item.tag || '通用';
                        return itemCat === activeCategory;
                    });
                }
                
                if (searchQuery) {
                    records = records.filter(item => 
                        ((item.category || '').toLowerCase().includes(searchQuery)) ||
                        ((item.title || item.tag || '').toLowerCase().includes(searchQuery)) ||
                        ((item.content || '').toLowerCase().includes(searchQuery))
                    );
                }

                statTotal.innerText = records.length;

                if (records.length === 0) {
                    let emptyMsg = '库中暂无数据，请新建或在设置中注入演示数据。';
                    if (searchQuery) {
                        emptyMsg = `未找到包含 "<span class="text-neonCyan">${escapeHtml(searchQuery)}</span>" 的记录。<br><button onclick="clearSearch()" class="mt-4 px-4 py-1.5 bg-neonPink/10 text-neonPink border border-neonPink/30 rounded-full hover:bg-neonPink/20 transition-colors text-[11px] font-bold">清空搜索条件</button>`;
                    } else if (activeCategory === '⭐ 收藏') {
                        emptyMsg = '暂无星标收藏，去列表中点亮星星吧！';
                    } else if (activeCategory !== 'All') {
                        emptyMsg = `[${escapeHtml(activeCategory)}] 分类下暂无内容。`;
                    }

                    listContainer.innerHTML = `
                        <div style="column-span: all;" class="w-full flex flex-col items-center justify-center py-20">
                            <span class="text-gray-500 text-xs tracking-wide text-center leading-relaxed">${emptyMsg}</span>
                        </div>`;
                    return;
                }

                listContainer.innerHTML = records.map(item => {
                    const displayTitle = item.title || item.tag || '未命名片段';
                    const displayCat = item.category || '通用';

                    return `
                    <div class="masonry-item gradient-border rounded-[20px] overflow-hidden group">
                        <div class="bg-darkCard rounded-[19px] h-full flex flex-col">
                            ${item.image ? `
                                <div class="relative w-full pt-[50%] overflow-hidden rounded-t-[19px] bg-[#0B0B15]">
                                    <img src="${item.image}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-105 cursor-zoom-in" onclick="openImageLightbox('${item.image}')">
                                    <div class="absolute inset-0 bg-gradient-to-t from-darkCard via-transparent to-transparent pointer-events-none"></div>
                                </div>
                            ` : ''}
                            
                            <div class="p-4 flex-grow flex flex-col">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="badge-neon inline-block max-w-[140px] truncate" title="${escapeHtml(displayCat)}">
                                        ${escapeHtml(displayCat)}
                                    </span>
                                    <span class="text-[9px] text-gray-500 font-mono shrink-0">
                                        ${new Date(item.timestamp).toLocaleDateString()}
                                    </span>
                                </div>
                                
                                ${displayTitle !== '未命名片段' ? `<h4 class="text-xs font-bold text-white mb-2 tracking-wide truncate">${escapeHtml(displayTitle)}</h4>` : ''}
                                
                                <div class="whitespace-pre-wrap break-all text-xs text-gray-300 font-mono leading-relaxed bg-[#0B0B15] p-3 rounded-lg border border-white/5 max-h-32 overflow-y-auto no-scrollbar mb-3 relative flex-grow" id="content-${item.id}">${escapeHtml(item.content)}</div>
                                
                                <div class="flex items-center gap-1.5 mt-auto pt-2 border-t border-white/5">
                                    <button onclick="copyPromptTextById('${item.id}')" class="flex-1 btn-card-action hover:text-white hover:bg-white/10 text-[11px] font-bold py-2 gap-1.5 text-gray-300 transition-colors" title="复制">
                                        <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                        Copy
                                    </button>
                                    
                                    <button onclick="toggleFavorite('${item.id}')" class="w-8 h-8 btn-card-action shrink-0 ${item.isFavorite ? 'text-yellow-400 bg-yellow-400/10 border-yellow-400/30' : 'hover:text-yellow-400 hover:bg-yellow-400/10 hover:border-yellow-400/30'}" title="${item.isFavorite ? '取消收藏' : '加入收藏'}">
                                        <svg class="w-4 h-4 shrink-0" fill="${item.isFavorite ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                                    </button>

                                    <button onclick="openEditModal('${item.id}')" class="w-8 h-8 btn-card-action hover:text-white hover:bg-neonCyan/20 hover:border-neonCyan/50 shrink-0" title="编辑">
                                        <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                    </button>
                                    <button onclick="openConfirmModal('${item.id}')" class="w-8 h-8 btn-card-action hover:text-white hover:bg-danger/20 hover:border-danger/50 shrink-0" title="删除">
                                        <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Render error:", err);
                showToast("核心数据读取异常", "error");
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await initDB();
                loadAndRenderList();
            } catch (err) {
                showToast("当前环境暂不支持 IndexedDB", "error");
            }
        });
    </script>
</body>
</html>
