<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 统一应用名称 -->
    <title>PromptHub - Neon Edition</title>
    <!-- 添加与 Logo 完全一致的 SVG Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><defs><linearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'><stop offset='0%25' stop-color='%23FF007A'/><stop offset='100%25' stop-color='%2300E5FF'/></linearGradient></defs><circle cx='12' cy='12' r='12' fill='url(%23g)'/><path stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none' d='M13 10V3L4 14h7v7l9-11h-7z' transform='translate(4,4) scale(0.66)'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0B0B15',
                        darkCard: '#151522',
                        neonPink: '#FF007A',
                        neonCyan: '#00E5FF',
                        danger: '#FF3366',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer components {
            .btn-primary {
                @apply w-full bg-gradient-to-r from-neonPink to-neonCyan text-white text-sm font-bold py-2.5 rounded-lg hover:opacity-90 transition-opacity shadow-[0_0_15px_rgba(255,0,122,0.3)];
            }
            .btn-danger {
                @apply px-4 py-1.5 text-xs font-bold text-white bg-danger hover:bg-red-600 shadow-[0_0_10px_rgba(255,51,102,0.4)] rounded-lg transition-colors;
            }
            .btn-ghost {
                @apply px-4 py-1.5 text-xs font-bold text-gray-300 hover:text-white bg-white/5 hover:bg-white/10 rounded-lg transition-colors;
            }
            .btn-panel {
                @apply flex flex-1 items-center justify-center gap-1.5 px-4 py-2 bg-[#0B0B15] border border-white/10 text-white text-xs rounded-lg transition-colors;
            }
            .btn-icon-rounded {
                @apply flex items-center justify-center p-1.5 text-gray-500 hover:text-white bg-white/5 hover:bg-white/10 rounded-full transition-all shrink-0;
            }
            .btn-card-action {
                @apply flex items-center justify-center text-gray-400 bg-white/5 border border-white/10 rounded-lg transition-all shrink-0;
            }
            .form-input {
                @apply w-full bg-[#0B0B15] text-white text-xs border border-white/10 rounded-lg focus:outline-none focus:border-neonCyan focus:ring-1 focus:ring-neonCyan transition-all;
            }
            .form-label {
                @apply block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1;
            }
            .modal-panel {
                @apply bg-darkCard border border-white/10 rounded-2xl p-5 sm:p-6 relative transform scale-95 transition-transform duration-200 m-auto shadow-2xl;
            }
            .badge-neon {
                @apply text-[10px] font-bold px-2.5 py-0.5 bg-white/5 text-neonCyan rounded-full border border-neonCyan/20;
            }
        }
    </style>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            background-color: #0B0B15;
            color: #ffffff;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 122, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* 修复 4: 注入全局优美的暗黑滚动条，干掉 Windows/Mac 丑陋的原生滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        .masonry { column-count: 1; column-gap: 1rem; }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        @media (min-width: 1280px) { .masonry { column-count: 4; } }
        @media (min-width: 1536px) { .masonry { column-count: 5; } }
        
        .masonry-item { break-inside: avoid-column; margin-bottom: 1rem; display: inline-block; width: 100%; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .scroll-mask {
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .gradient-border {
            position: relative;
            background: linear-gradient(135deg, #151522, #151522) padding-box,
                        linear-gradient(135deg, rgba(255,0,122,0.5), rgba(0,229,255,0.5)) border-box;
            border: 1px solid transparent;
        }
        .gradient-border:hover {
            background: linear-gradient(135deg, #1c1c2e, #1c1c2e) padding-box,
                        linear-gradient(135deg, #FF007A, #00E5FF) border-box;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
        }

        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #FF007A, #00E5FF);
        }

        .btn-outline-gradient {
            position: relative;
            background: transparent;
            z-index: 1;
        }
        .btn-outline-gradient::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            padding: 2px;
            background: linear-gradient(to right, #FF007A, #00E5FF);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .btn-outline-gradient:hover {
            background: linear-gradient(to right, rgba(255,0,122,0.1), rgba(0,229,255,0.1));
            box-shadow: 0 0 12px rgba(255, 0, 122, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen">

    <header class="fixed top-0 inset-x-0 h-14 backdrop-blur-xl bg-darkBg/80 border-b border-white/5 z-40 flex items-center justify-between px-4 md:px-6 shadow-sm gap-3">
        <div class="flex items-center space-x-2 shrink-0">
            <div class="w-7 h-7 rounded-full bg-gradient-to-tr from-neonPink to-neonCyan flex items-center justify-center shadow-[0_0_8px_rgba(255,0,122,0.5)]">
                <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            </div>
            <h1 class="text-lg font-bold tracking-tight text-white hidden md:block">Prompt<span class="text-gradient">Hub</span></h1>
        </div>

        <div class="flex-1 max-w-lg relative group">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 transition-colors group-focus-within:text-neonCyan z-10 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="searchInput" placeholder="搜索标题或内容..." 
                class="form-input relative z-0 !bg-[#151522]/80 backdrop-blur-sm pl-9 pr-4 py-2 placeholder-gray-400">
        </div>

        <div class="flex items-center gap-2 shrink-0">
            <button onclick="openSettingsModal()" class="btn-icon-rounded" title="设置与管理">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
            <button onclick="openAddModal()" class="btn-outline-gradient text-white px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap">
                + 新建
            </button>
        </div>
    </header>

    <div class="max-w-[1500px] mx-auto pt-20 px-4 md:px-6 space-y-4">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b border-white/5 pb-3">
            <div id="categoryTabs" class="flex gap-1.5 overflow-x-auto no-scrollbar w-full sm:w-auto pb-1"></div>
            <div class="text-xs text-gray-500 whitespace-nowrap shrink-0">
                共 <span id="statTotal" class="text-neonCyan font-bold mx-0.5">0</span> 条
            </div>
        </div>
        <div id="promptList" class="masonry pb-10"></div>
    </div>

    <!-- ================= 核心表单 Modal (修复 2: 点击外部遮罩层关闭弹窗) ================= -->
    <div id="addModal" onclick="if(event.target === this) closeAddModal()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 overflow-y-auto px-4 py-6">
        <div class="modal-panel max-w-3xl w-full" id="addModalContent">
            <button onclick="closeAddModal()" class="btn-icon-rounded absolute top-4 right-4 z-10"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            
            <div class="flex items-center gap-3 mb-5" id="formModalHeader"></div>
            
            <div class="flex flex-col md:flex-row gap-5 mb-5">
                <div class="w-full md:w-5/12 flex flex-col gap-4">
                    <div>
                        <label class="form-label">分类</label>
                        <select id="categorySelect" class="form-input px-3 py-2.5 cursor-pointer"></select>
                    </div>
                    <div>
                        <label class="form-label">标题</label>
                        <input type="text" id="titleInput" placeholder="一句话描述用途" class="form-input px-3 py-2.5">
                    </div>
                    <div class="flex-grow flex flex-col">
                        <label class="form-label flex justify-between">
                            <span>视觉参考图</span>
                            <span class="text-gray-500 font-normal normal-case tracking-normal">支持直接 Ctrl+V 粘贴</span>
                        </label>
                        
                        <div id="uploadZone" onclick="document.getElementById('imageInput').click()" 
                            class="flex-grow border border-dashed border-white/15 rounded-lg p-4 text-center cursor-pointer bg-[#0B0B15]/50 hover:bg-[#0B0B15] hover:border-neonPink transition-all group flex flex-col items-center justify-center min-h-[120px]">
                            <svg class="w-5 h-5 text-gray-600 group-hover:text-neonPink transition-colors mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            <span id="uploadTip" class="text-[11px] text-gray-500 font-medium group-hover:text-white transition-colors">点击或粘贴截图</span>
                        </div>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">

                        <div id="previewWrapper" class="hidden relative group h-full min-h-[120px]">
                            <img id="previewImg" src="" class="w-full h-full object-cover rounded-lg border border-white/10">
                            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity rounded-lg flex items-center justify-center backdrop-blur-sm">
                                <button onclick="clearSelectedImage()" class="btn-icon-rounded text-white bg-danger hover:bg-red-600 shadow-lg transform scale-90 group-hover:scale-100">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-full md:w-7/12 flex flex-col">
                    <label class="form-label">内容 <span class="text-neonPink">*</span></label>
                    <textarea id="contentInput" placeholder="描述你希望 AI 做什么..." class="form-input px-3 py-2.5 flex-grow resize-none leading-relaxed min-h-[200px]"></textarea>
                </div>
            </div>

            <button id="formSubmitBtn" onclick="savePrompt()" class="btn-primary"></button>
        </div>
    </div>

    <!-- ================= 全局设置 Modal (修复 2) ================= -->
    <div id="settingsModal" onclick="if(event.target === this) closeSettingsModal()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 px-4 overflow-y-auto">
        <div class="modal-panel max-w-md w-full" id="settingsModalContent">
            <button onclick="closeSettingsModal()" class="btn-icon-rounded absolute top-4 right-4"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            <div class="flex items-center gap-3 mb-6">
                <div class="p-2 bg-neonPink/10 rounded-lg border border-neonPink/20"><svg class="w-5 h-5 text-neonPink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></div>
                <h3 class="text-lg font-bold text-white tracking-tight">Global <span class="text-neonPink">Settings</span></h3>
            </div>
            <div class="space-y-6">
                <div>
                    <h4 class="form-label">数据备份管理</h4>
                    <div class="flex gap-2">
                        <input type="file" id="importInput" accept=".json" class="hidden">
                        <button onclick="document.getElementById('importInput').click()" class="btn-panel hover:border-neonCyan"><svg class="w-3.5 h-3.5 text-neonCyan" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>导入 JSON</button>
                        <button onclick="exportData()" class="btn-panel hover:border-neonPink"><svg class="w-3.5 h-3.5 text-neonPink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>导出备份</button>
                    </div>
                    <button onclick="insertMockData()" class="btn-panel mt-2 bg-transparent border-dashed hover:bg-white/5 hover:text-white text-gray-400 border-white/10"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>注入样式演示数据 (Mock)</button>
                </div>
                <div>
                    <h4 class="form-label">自定义分类标签</h4>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="newCategoryInput" placeholder="输入新分类名称..." class="form-input px-3 py-2">
                        <button onclick="addCategory()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-xs font-medium transition-colors border border-white/5 shrink-0">添加</button>
                    </div>
                    <div class="bg-[#0B0B15] border border-white/5 rounded-lg p-1.5 max-h-48 overflow-y-auto no-scrollbar space-y-1" id="settingsCategoryList"></div>
                </div>
                <div class="pt-2 border-t border-white/5">
                    <button onclick="openCustomConfirm('Clear <span class=\'text-danger\'>All Data</span>', '警告：此操作将清空本地所有提示词数据且不可恢复！是否继续？', '一键清空', async () => { await dbOps.clearAll(); showToast('本地库已完全清空'); loadAndRenderList(); closeSettingsModal(); })" class="btn-panel bg-danger/10 hover:bg-danger/20 text-danger border-danger/20 hover:border-danger/50 font-bold tracking-wide">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        一键清空本地库
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 确认删除 Modal (修复 2 & 3: 增加灵活性应对分类删除) ================= -->
    <div id="confirmModal" onclick="if(event.target === this) closeConfirmModal()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 px-4">
        <div class="modal-panel max-w-xs w-full" id="confirmModalContent">
            <div class="flex items-center gap-2 mb-3">
                <div class="p-1.5 bg-danger/10 rounded border border-danger/20">
                    <svg class="w-4 h-4 text-danger" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h3 class="text-base font-bold text-white tracking-tight" id="confirmTitle">Confirm</h3>
            </div>
            <p class="text-xs text-gray-400 mb-5 ml-1" id="confirmDesc">此操作不可恢复，确认继续？</p>
            <div class="flex justify-end gap-2">
                <button onclick="closeConfirmModal()" class="btn-ghost">取消</button>
                <button id="confirmBtn" class="btn-danger">确认操作</button>
            </div>
        </div>
    </div>

    <!-- ================= 修复 1: 全屏图片预览灯箱 (Lightbox Modal) ================= -->
    <div id="imageLightboxModal" onclick="if(event.target === this) closeImageLightbox()" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[70] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-4 sm:p-10 cursor-zoom-out">
        <button onclick="closeImageLightbox()" class="btn-icon-rounded absolute top-4 right-4 z-10 bg-black/50 hover:bg-black text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
        <img id="lightboxImg" src="" class="max-w-full max-h-full object-contain rounded-xl shadow-2xl transform scale-95 transition-transform duration-300 pointer-events-none" />
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 bg-darkCard border border-white/10 text-white px-4 py-2 rounded-full shadow-[0_4px_15px_rgba(0,0,0,0.5)] text-xs font-medium opacity-0 pointer-events-none transition-opacity z-[80] flex items-center gap-1.5">
        <span id="toastIcon"></span>
        <span id="toastMessage"></span>
    </div>

    <script>
        // ==========================================
        // 0. 分类管理系统 (基于 localStorage)
        // ==========================================
        const DEFAULT_CATEGORIES = ['通用', 'UI/UX 视觉', '代码开发', '文案编辑'];
        
        function getCategories() {
            const saved = localStorage.getItem('PromptHub_Categories');
            return saved ? JSON.parse(saved) : DEFAULT_CATEGORIES;
        }

        function saveCategories(cats) {
            localStorage.setItem('PromptHub_Categories', JSON.stringify(cats));
        }

        // ==========================================
        // 1. IndexedDB 存储核心
        // ==========================================
        const DB_NAME = 'PromptHub_DB';
        const DB_VERSION = 1;
        const STORE_NAME = 'prompts';
        let db = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(db); };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        const dbOps = {
            add: (data) => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                tx.objectStore(STORE_NAME).add(data).onsuccess = resolve;
                tx.onerror = (e) => reject(e.target.error);
            }),
            put: (data) => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                tx.objectStore(STORE_NAME).put(data).onsuccess = resolve;
                tx.onerror = (e) => reject(e.target.error);
            }),
            getAll: () => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readonly');
                tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => resolve(e.target.result);
                tx.onerror = (e) => reject(e.target.error);
            }),
            delete: (id) => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                tx.objectStore(STORE_NAME).delete(id).onsuccess = resolve;
                tx.onerror = (e) => reject(e.target.error);
            }),
            clearAll: () => new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                tx.objectStore(STORE_NAME).clear().onsuccess = resolve;
                tx.onerror = (e) => reject(e.target.error);
            })
        };

        async function saveEditCategory(index, oldCat) {
            const input = document.getElementById(`cat-input-${index}`);
            const newCat = input.value.trim();
            if (!newCat || newCat === oldCat) return cancelEditCategory(index);
            
            let cats = getCategories();
            if (cats.includes(newCat)) return showToast('该分类名已存在', 'error');

            cats[index] = newCat;
            saveCategories(cats);
            
            const records = await dbOps.getAll();
            let updatedCount = 0;
            for (let r of records) {
                if (r.category === oldCat || (!r.category && r.tag === oldCat)) {
                    r.category = newCat;
                    await dbOps.put(r);
                    updatedCount++;
                }
            }

            renderSettingsCategories();
            if(activeCategory === oldCat) activeCategory = newCat;
            showToast(`重命名成功${updatedCount > 0 ? `，已更新 ${updatedCount} 条关联记录` : ''}`);
        }

                    return;
                } catch (err) { console.warn('Clipboard API fallback'); }

            textArea.value = text;

            document.body.appendChild(textArea); textArea.select();
            try {
                if(document.execCommand('copy')) showToast('✨ 已复制！');
                else showToast('复制失败', 'error');
            } catch (err) { showToast('复制异常', 'error'); }

        let currentImageBase64 = null;

        function processImageFile(file) {
            document.getElementById('uploadTip').innerText = "处理压缩中...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image(); img.src = event.target.result;
                img.onload = () => {
                    const maxWidth = 1024; let { width, height } = img;
                    if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    currentImageBase64 = canvas.toDataURL('image/webp', 0.8);
                    
                    document.getElementById('previewImg').src = currentImageBase64;
                    document.getElementById('uploadZone').classList.add('hidden');
                    document.getElementById('previewWrapper').classList.remove('hidden');
                    document.getElementById('uploadTip').innerText = "点击或粘贴截图";
                };
            };
        }

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) processImageFile(file);
        });

        document.addEventListener('paste', (e) => {
            const addModal = document.getElementById('addModal');
            if (addModal.classList.contains('opacity-0')) return;

            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    processImageFile(file);
                    showToast('识别到剪贴板图片');
                    e.preventDefault();
                    break; 
                }
            }
        });

                const blob = new Blob([dataStr], { type: "application/json" });

                a.download = `PromptHub_Backup_${new Date().toISOString().split('T')[0]}.json`;

                try {
                    const data = JSON.parse(event.target.result);
                    if (!Array.isArray(data)) throw new Error("Format error");
                    
                    let importedCount = 0;
                    for (const item of data) {
                        if (item.id) delete item.id;
                        if (item.content) {
                            if (!item.timestamp) item.timestamp = Date.now();
                            await dbOps.add(item);
                            importedCount++;
                        }
                    }
                    if(importedCount > 0) showToast(`导入成功 (追加 ${importedCount} 条记录)`);
                    else showToast('文件中未发现有效数据', 'error');
                    
                    document.getElementById('importInput').value = ''; 
                    loadAndRenderList();
                    closeSettingsModal(); 
                } catch (err) {
                    showToast('文件解析失败', 'error');
                }
            };
            reader.readAsText(file);
        });

        // ==========================================
        // 4. 瀑布流渲染与搜索过滤
        // ==========================================
        const escapeHtml = (s) => {
            if (s === null || s === undefined) return '';
            return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        };

        let activeCategory = 'All';

        function renderCategoryTabs() {
            const tabsContainer = document.getElementById('categoryTabs');
            const userCats = getCategories();
            const uniqueTags = ['All', ...userCats];
            
            tabsContainer.innerHTML = uniqueTags.map(tag => {
                const isActive = tag === activeCategory;
                const label = tag === 'All' ? '全部' : escapeHtml(tag);
                const activeClass = isActive 
                    ? 'bg-neonCyan/10 text-neonCyan border-neonCyan/50 shadow-[0_0_8px_rgba(0,229,255,0.2)]' 
                    : 'bg-transparent text-gray-400 border-white/10 hover:border-white/30 hover:text-white';
                
                const safeTag = tag.replace(/'/g, "\\'"); 
                return `<button onclick="setActiveCategory('${safeTag}')" class="px-3 py-1 rounded-full text-[11px] font-medium border transition-all whitespace-nowrap ${activeClass}">${label}</button>`;
            }).join('');
        }

        function setActiveCategory(category) {
            activeCategory = category;
            loadAndRenderList();
        }

        async function loadAndRenderList() {
            const listContainer = document.getElementById('promptList');
            const statTotal = document.getElementById('statTotal');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            
            try {
                let records = await dbOps.getAll();
                records.sort((a, b) => b.timestamp - a.timestamp);
                
                renderCategoryTabs();

                if (activeCategory !== 'All') {
                    records = records.filter(item => {
                        const itemCat = item.category || item.tag || '通用';
                        return itemCat === activeCategory;
                    });
                }
                
                if (searchQuery) {
                    records = records.filter(item => 
                        ((item.category || '').toLowerCase().includes(searchQuery)) ||
                        ((item.title || item.tag || '').toLowerCase().includes(searchQuery)) ||
                        ((item.content || '').toLowerCase().includes(searchQuery))
                    );
                }

                statTotal.innerText = records.length;

                if (records.length === 0) {
                    listContainer.innerHTML = `
                        <div style="column-span: all;" class="w-full flex justify-center py-20">
                            <span class="text-gray-500 text-xs tracking-wide text-center">
                                ${searchQuery || activeCategory !== 'All' ? '未找到匹配记录，尝试更换检索词。' : '库中暂无数据，请新建或在设置中注入演示数据。'}
                            </span>
                        </div>`;
                    return;
                }

                listContainer.innerHTML = records.map(item => {
                    const displayTitle = item.title || item.tag || '未命名片段';
                    const displayCat = item.category || '通用';

                    // 修复 1: 弃用 window.open，改为调用应用内的全屏灯箱 openImageLightbox
                    return `
                    <div class="masonry-item gradient-border rounded-[20px] overflow-hidden group">
                        <div class="bg-darkCard rounded-[19px] h-full flex flex-col">
                            ${item.image ? `
                                <div class="relative w-full pt-[50%] overflow-hidden rounded-t-[19px] bg-[#0B0B15]">
                                    <img src="${item.image}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-105 cursor-zoom-in" onclick="openImageLightbox('${item.image}')">
                                    <div class="absolute inset-0 bg-gradient-to-t from-darkCard via-transparent to-transparent pointer-events-none"></div>
                                </div>
                            ` : ''}
                            
                            <div class="p-4 flex-grow flex flex-col">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="badge-neon">
                                        ${escapeHtml(displayCat)}
                                    </span>
                                    <span class="text-[9px] text-gray-500 font-mono">
                                        ${new Date(item.timestamp).toLocaleDateString()}
                                    </span>
                                </div>
                                
                                ${displayTitle !== '未命名片段' ? `<h4 class="text-xs font-bold text-white mb-2 tracking-wide truncate">${escapeHtml(displayTitle)}</h4>` : ''}
                                
                                <div class="scroll-mask whitespace-pre-wrap text-xs text-gray-300 font-mono leading-relaxed bg-[#0B0B15] p-3 rounded-lg border border-white/5 max-h-32 overflow-y-auto no-scrollbar mb-3 relative flex-grow" id="content-${item.id}">${escapeHtml(item.content)}</div>
                                
                                <div class="flex items-center gap-1.5 mt-auto pt-2 border-t border-white/5">
                                    <button onclick="copyPromptTextById(${item.id})" class="flex-1 btn-card-action hover:text-white hover:bg-white/10 text-[11px] font-bold py-2 gap-1.5 text-white" title="复制">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                        Copy
                                    </button>
                                    <button onclick="openEditModal(${item.id})" class="w-8 h-8 btn-card-action hover:text-white hover:bg-neonCyan/20 hover:border-neonCyan/50 shrink-0" title="编辑">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                    </button>
                                    <button onclick="openConfirmModal(${item.id})" class="w-8 h-8 btn-card-action hover:text-white hover:bg-danger/20 hover:border-danger/50 shrink-0" title="删除">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Render error:", err);
                showToast("核心数据读取异常", "error");
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await initDB();
                loadAndRenderList();
            } catch (err) {
                showToast("当前环境暂不支持 IndexedDB", "error");
            }
        });
    </script>
</body>
</html>
